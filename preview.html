<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Demo Work | PRIME DIGITAL TEAM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:#fff;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  background:#000;
}
header h1{
  color:#00bfff;
}

/* BACK BUTTON */
.back-btn{
  display:inline-block;
  margin-top:10px;
  text-decoration:none;
  background:linear-gradient(45deg,#00bfff,#ff6600);
  padding:10px 20px;
  border-radius:25px;
  color:#fff;
}

/* SECTION */
section{
  padding:60px 20px;
  text-align:center;
}

h2{
  font-size:2.5rem;
  margin-bottom:30px;
  color:#00bfff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,191,255,0.2);
  transition:0.4s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(255,102,0,0.7);
}

/* VIDEO */
video{
  width:100%;
  border-radius:10px;
}

/* FOOTER */
footer{
  padding:20px;
  text-align:center;
  background:#000;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <h1>PRIME DIGITAL TEAM</h1>
  <a href="index.html" class="back-btn">⬅ Back to Home</a>
</header>

<section>
  <h2>🎬 Our Demo Work</h2>

  <div class="grid">

    <div class="card">
      <video src="demo1.mp4" controls></video>
      <p>Short Video Editing Demo</p>
    </div>

    <div class="card">
      <video src="demo2.mp4" controls></video>
      <p>YouTube Long Video Demo</p>
    </div>

    <div class="card">
      <video src="demo3.mp4" controls></video>
      <p>Reel Editing Demo</p>
    </div>

    <!-- Extra Demo Add Kar Sakte Ho -->
    <div class="card">
      <video src="demo4.mp4" controls></video>
      <p>Creative Edit Sample</p>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 PRIME DIGITAL TEAM | All Rights Reserved</p>
</footer>

</body>
</html>
